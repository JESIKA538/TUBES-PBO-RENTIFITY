# ===================================
# Rentifity Backend - Application Config
# Tugas Besar PBO
# ===================================

# Server Configuration
server.port=${PORT:8080}

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:rentify}?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson JSON Configuration
# Mengubah camelCase Java menjadi snake_case di JSON (sesuai format Laravel)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Jakarta

# JWT Configuration
jwt.secret=rentifity-super-secret-key-for-pbo-tubes-2025-very-secure-key-min-256-bits-required
jwt.expiration=86400000

# File Upload Size Limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-post-size=10MB
server.tomcat.max-swallow-size=10MB
